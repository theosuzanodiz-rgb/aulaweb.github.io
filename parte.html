<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Disciplinas</title>
  <link rel="stylesheet" href="parte.css" />
</head>
<body>

  <header>
    <h1>Sistema Acadêmico</h1>
    <p class="subtitulo">Cadastro de Disciplinas</p>
  </header>

  <main>
    <section class="formato-secao">
      <form id="formDisciplina">

        <div class="form-grid">

          <div class="campo">
            <label for="nomeDisciplina">Nome da Disciplina</label>
            <input type="text" id="nomeDisciplina" name="nomeDisciplina" placeholder="Ex: Cálculo I" required />
          </div>

          <div class="campo">
            <label for="codigoDisciplina">Código da Disciplina</label>
            <input type="text" id="codigoDisciplina" name="codigoDisciplina" placeholder="Ex: MAT001" required />
          </div>

          <div class="campo">
            <label for="nomeProfessor">Nome do Professor</label>
            <input type="text" id="nomeProfessor" name="nomeProfessor" placeholder="Ex: Prof. João Silva" required />
          </div>

          <div class="campo">
            <label for="cargaHoraria">Carga Horária (horas)</label>
            <input type="number" id="cargaHoraria" name="cargaHoraria" placeholder="Ex: 60" min="1" required />
          </div>

          <div class="campo">
            <label for="emailProfessor">E-mail do Professor</label>
            <input type="email" id="emailProfessor" name="emailProfessor" placeholder="Ex: professor@ifrj.edu.br" required />
          </div>

          <div class="campo">
            <label for="dataInicio">Data de Início</label>
            <input type="date" id="dataInicio" name="dataInicio" required />
          </div>

          <div class="campo">
            <label for="periodo">Período</label>
            <select id="periodo" name="periodo" required>
              <option value="" disabled selected>Selecione o período</option>
              <option value="1º Período">1º Período</option>
              <option value="2º Período">2º Período</option>
              <option value="3º Período">3º Período</option>
              <option value="4º Período">4º Período</option>
              <option value="5º Período">5º Período</option>
              <option value="6º Período">6º Período</option>
            </select>
          </div>

          <div class="campo">
            <label for="sala">Sala / Local</label>
            <input type="text" id="sala" name="sala" placeholder="Ex:Sala 11" required />
          </div>

        </div>

        <div class="botoes">
          <button type="button" id="btnSalvar"
            onmouseover="mostrarMensagem('Os dados do formulário serão adicionados à tabela abaixo!')"
            onmouseout="limparMensagem()">
            Salvar
          </button>
          <button type="button" id="btnLimpar"
            onmouseover="mostrarMensagem('Os campos preenchidos serão limpos!')"
            onmouseout="limparMensagem()">
            Limpar
          </button>
        </div>

        <div id="mensagem"></div>

      </form>
    </section>

    <section class="tabela-section">
      <h2>Dados cadastrados</h2>
      <div class="tabela-wrapper">
        <table id="tabelaDisciplinas">
          <thead>
            <tr>
              <th>Nome da Disciplina</th>
              <th>Código</th>
              <th>Professor</th>
              <th>Carga Horária</th>
              <th>E-mail</th>
              <th>Data de Início</th>
              <th>Período</th>
              <th>Sala</th>
            </tr>
          </thead>
          <tbody id="corpoTabela">
            <!-- Linhas inseridas via JavaScript -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="parte.js"></script>
</body>
</html>
